<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SUN Associates (Atholi, Kozhikode) — premium electrical & hardware products: fans, switches, lighting, tools, pipes and more. Browse products, add to cart, and place WhatsApp enquiries.">
  <meta name="keywords" content="SUN Associates, electrical shop Kozhikode, hardware shop Atholi, switches, fans, lighting, tools, pipes, plumbing, electrical supplies, Kerala">
  <meta name="theme-color" content="#021B1E">
  <meta name="robots" content="index,follow">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SUN Associates">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SUN Associates | Premium Electrical & Hardware</title>
  <link rel="manifest" href="manifest.json">

  <!-- Open Graph -->
  <meta property="og:title" content="SUN Associates | Premium Electrical & Hardware">
  <meta property="og:description" content="Premium electrical & hardware products in Atholi, Kozhikode. Explore products and place WhatsApp enquiries.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="SUN Associates | Premium Electrical & Hardware">
  <meta name="twitter:description" content="Premium electrical & hardware products in Atholi, Kozhikode. Explore products and place WhatsApp enquiries.">
  <meta name="twitter:image" content="icons/Icon-512.png">

  <!-- Local Business structured data (basic) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "SUN Associates",
    "image": "icons/Icon-512.png",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Atholi",
      "addressRegion": "Kerala",
      "postalCode": "673315",
      "addressCountry": "IN"
    },
    "email": "sunassociatesatholi@gmail.com",
    "telephone": "+91 9846203813"
  }
  </script>

  <style>
    :root {
      --bg: #021B1E;
      --card: rgba(16, 38, 41, 0.72);
      --border: rgba(30, 58, 62, 0.9);
      --gold: #F2C230;
      --text: #FFFFFF;
      --muted: rgba(184, 184, 184, 0.95);
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: radial-gradient(1200px 700px at 15% 20%, rgba(242,194,48,0.10), transparent 55%),
                  radial-gradient(1100px 600px at 85% 25%, rgba(10,44,48,0.55), transparent 60%),
                  var(--bg);
      overflow: hidden;
    }
    #preloader {
      position: fixed; inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .shell {
      width: min(520px, 92vw);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.50);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 28px 24px;
      display: grid;
      gap: 16px;
      justify-items: center;
      text-align: center;
    }
    .logoWrap {
      width: 108px; height: 108px;
      border-radius: 26px;
      display: grid;
      place-items: center;
      background: rgba(2,27,30,0.55);
      border: 1px solid rgba(242,194,48,0.35);
      box-shadow: 0 12px 32px rgba(0,0,0,0.35);
      transform: translateY(6px);
      animation: popIn 900ms cubic-bezier(.2,.9,.2,1) 1 forwards;
      opacity: 0;
    }
    .logo {
      width: 82px;
      height: 82px;
      border-radius: 18px;
      animation: float 2.2s ease-in-out 900ms infinite;
    }
    .title {
      font: 800 28px/1.1 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      letter-spacing: 1px;
      color: var(--text);
      margin: 0;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 700ms ease 420ms 1 forwards;
    }
    .subtitle {
      font: 500 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color: var(--muted);
      margin: 0;
      opacity: 0;
      transform: translateY(8px);
      animation: fadeUp 700ms ease 560ms 1 forwards;
    }
    .bar {
      width: 220px;
      height: 10px;
      border-radius: 999px;
      background: rgba(30,58,62,0.55);
      border: 1px solid rgba(30,58,62,0.95);
      overflow: hidden;
      position: relative;
      margin-top: 4px;
    }
    .bar::before {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-60%);
      background: linear-gradient(90deg, transparent, rgba(242,194,48,0.9), transparent);
      animation: shimmer 1.1s ease-in-out infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-60%); } 100% { transform: translateX(60%); } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes popIn { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="preloader" aria-label="Loading SUN Associates">
    <div class="shell">
      <div class="logoWrap">
        <!-- Flutter web build places assets under /assets/ -->
        <img class="logo" src="assets/assets/images/logo.png" alt="SUN Associates Logo"/>
      </div>
      <p class="title">SUN Associates</p>
      <p class="subtitle">Premium Electrical &amp; Hardware</p>
      <div class="bar" aria-hidden="true"></div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Remove preloader once Flutter paints first frame (best-effort).
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('preloader');
      if (el) el.remove();
      document.body.style.overflow = '';
    });
    // Fallback: if event isn't dispatched, allow scroll after a bit.
    setTimeout(function () { document.body.style.overflow = ''; }, 6000);
  </script>
</body>
</html>
